name: Update Dependencies

on:
  schedule:
    - cron: '0 3 * * 1'
  workflow_dispatch:

concurrency:
  group: dependencies-${{ github.repository }}
  cancel-in-progress: false

permissions:
  actions: read
  checks: read
  contents: read
  pull-requests: write

env:
  GITHUB_API_VERSION: '2026-03-10'

jobs:
  update:
    runs-on: ubuntu-24.04
    timeout-minutes: 180
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6.1.0
        with:
          token: ${{ github.token }}
          persist-credentials: false

      - name: Run offline tests
        run: |
          python3 -m unittest discover \
            --start-directory .github/scripts \
            --pattern 'test_*.py' \
            --verbose

      - name: Update dependencies
        id: update
        run: |
          report="${RUNNER_TEMP}/dependencies.md"
          python3 .github/scripts/dependencies.py | tee "${report}"
          cat "${report}" >> "${GITHUB_STEP_SUMMARY}"

          if git diff --quiet -- Dockerfile; then
            echo 'changed=false' >> "${GITHUB_OUTPUT}"
            exit 0
          fi

          mapfile -t files < <(git diff --name-only)
          if (( ${#files[@]} != 1 )) || [[ "${files[0]}" != 'Dockerfile' ]]; then
            echo 'The updater changed files other than Dockerfile.' >&2
            printf '%s\n' "${files[@]}" >&2
            exit 1
          fi

          git diff --check
          branch="automation/dependencies-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}"
          git switch --create "${branch}"
          git config user.name 'github-actions[bot]'
          git config user.email \
            '41898282+github-actions[bot]@users.noreply.github.com'
          git add -- Dockerfile
          git commit --message 'chore: update dependencies'

          {
            echo 'changed=true'
            printf 'branch=%s\n' "${branch}"
            printf 'head=%s\n' "$(git rev-parse HEAD)"
          } >> "${GITHUB_OUTPUT}"

      - name: Push update branch
        id: push
        if: steps.update.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: |
          branch='${{ steps.update.outputs.branch }}'
          head='${{ steps.update.outputs.head }}'
          created="$(date --utc +'%Y-%m-%dT%H:%M:%SZ')"
          authorization="$(
            printf 'x-access-token:%s' "${GH_TOKEN}" | base64 --wrap=0
          )"
          echo "::add-mask::${authorization}"

          GIT_CONFIG_COUNT=1 \
            GIT_CONFIG_KEY_0='http.https://github.com/.extraheader' \
            GIT_CONFIG_VALUE_0="AUTHORIZATION: basic ${authorization}" \
            git push "https://github.com/${GITHUB_REPOSITORY}.git" \
              "HEAD:refs/heads/${branch}"
          unset authorization

          {
            printf 'branch=%s\n' "${branch}"
            printf 'head=%s\n' "${head}"
            printf 'created=%s\n' "${created}"
          } >> "${GITHUB_OUTPUT}"

      - name: Open pull request
        id: pull
        if: steps.update.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: |
          branch='${{ steps.push.outputs.branch }}'
          head='${{ steps.push.outputs.head }}'
          body="${RUNNER_TEMP}/pull-request.md"
          {
            echo 'Automated weekly dependency update.'
            echo
            cat "${RUNNER_TEMP}/dependencies.md"
          } > "${body}"

          url="$(
            gh pr create \
              --repo "${GITHUB_REPOSITORY}" \
              --base main \
              --head "${branch}" \
              --title 'chore: update dependencies' \
              --body-file "${body}"
          )"
          pull="$(
            gh pr view "${url}" \
              --repo "${GITHUB_REPOSITORY}" \
              --json baseRefName,createdAt,headRefName,headRefOid,number,state \
              --jq '.'
          )"
          PULL="${pull}" python3 - "${branch}" "${head}" <<'PY'
          import json
          import os
          import sys

          branch, head = sys.argv[1:]
          pull = json.loads(os.environ['PULL'])
          if pull['baseRefName'] != 'main':
              raise RuntimeError('Pull request does not target main')
          if pull['headRefName'] != branch or pull['headRefOid'] != head:
              raise RuntimeError('Pull request does not use the pushed head')
          if pull['state'] != 'OPEN':
              raise RuntimeError('Pull request is not open')
          PY

          {
            printf 'number=%s\n' "$(
              PULL="${pull}" python3 -c \
                'import json, os; print(json.loads(os.environ["PULL"])["number"])'
            )"
            printf 'url=%s\n' "${url}"
          } >> "${GITHUB_OUTPUT}"

      - name: Wait for exact CI runs
        if: steps.update.outputs.changed == 'true'
        env:
          BRANCH: ${{ steps.push.outputs.branch }}
          CREATED: ${{ steps.push.outputs.created }}
          GH_TOKEN: ${{ github.token }}
          HEAD: ${{ steps.push.outputs.head }}
        run: |
          python3 - <<'PY'
          import json
          import os
          import subprocess
          import sys
          import time
          from datetime import datetime, timedelta, timezone
          from pathlib import Path

          sys.path.insert(0, str(Path('.github/scripts').resolve()))

          from automation import (
              Deadline,
              Run,
              WorkflowState,
              workflow_state,
          )

          branch = os.environ['BRANCH']
          boundary = datetime.fromisoformat(
              os.environ['CREATED'].replace('Z', '+00:00')
          )
          head = os.environ['HEAD']
          repository = os.environ['GITHUB_REPOSITORY']
          version = os.environ['GITHUB_API_VERSION']
          deadline = Deadline.after(
              datetime.now(timezone.utc),
              timedelta(minutes=120),
          )
          workflows = (
              ('build-and-push.yml', 'Build and Push', 'push'),
              ('dive.yml', 'Dive Test', 'push'),
              (
                  'structure-test.yml',
                  'Container Structure Test',
                  'push',
              ),
              ('trivy.yml', 'Trivy Scan', 'pull_request'),
          )
          terminal_failures = {
              WorkflowState.CANCELLED,
              WorkflowState.FAILED,
              WorkflowState.TIMED_OUT,
          }

          def fetch(filename: str) -> tuple[Run, ...]:
              command = (
                  'gh',
                  'api',
                  '-X',
                  'GET',
                  (
                      f'repos/{repository}/actions/workflows/'
                      f'{filename}/runs'
                  ),
                  '-H',
                  f'X-GitHub-Api-Version: {version}',
                  '-f',
                  f'branch={branch}',
                  '-f',
                  f'head_sha={head}',
                  '-f',
                  f'created=>={os.environ["CREATED"]}',
                  '-f',
                  'per_page=100',
              )
              result = subprocess.run(
                  command,
                  check=True,
                  stdout=subprocess.PIPE,
                  text=True,
              )
              payload = json.loads(result.stdout)
              return tuple(
                  Run(
                      identifier=item['id'],
                      workflow=item['name'],
                      event=item['event'],
                      head=item['head_sha'],
                      branch=item['head_branch'],
                      created=datetime.fromisoformat(
                          item['created_at'].replace('Z', '+00:00')
                      ),
                      attempt=item['run_attempt'],
                      status=item['status'],
                      conclusion=item['conclusion'],
                  )
                  for item in payload['workflow_runs']
              )

          previous = None
          while True:
              now = datetime.now(timezone.utc)
              states = {
                  name: workflow_state(
                      fetch(filename),
                      workflow=name,
                      event=event,
                      head=head,
                      branch=branch,
                      created=boundary,
                      deadline=deadline,
                      now=now,
                  )
                  for filename, name, event in workflows
              }
              snapshot = tuple(
                  (name, state.value) for name, state in states.items()
              )
              if snapshot != previous:
                  print(
                      ', '.join(
                          f'{name}: {state}' for name, state in snapshot
                      ),
                      flush=True,
                  )
                  previous = snapshot

              failed = {
                  name: state
                  for name, state in states.items()
                  if state in terminal_failures
              }
              if failed:
                  detail = ', '.join(
                      f'{name}: {state.value}'
                      for name, state in failed.items()
                  )
                  raise RuntimeError(f'CI did not succeed: {detail}')
              if all(
                  state is WorkflowState.SUCCEEDED
                  for state in states.values()
              ):
                  break

              remaining = deadline.remaining(
                  datetime.now(timezone.utc)
              ).total_seconds()
              time.sleep(min(20, max(remaining, 0)))
          PY

      - name: Approve pull request
        if: steps.update.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh api \
            -X POST \
            -H "X-GitHub-Api-Version: ${GITHUB_API_VERSION}" \
            "repos/${GITHUB_REPOSITORY}/pulls/${{ steps.pull.outputs.number }}/reviews" \
            -f event=APPROVE \
            -f commit_id='${{ steps.push.outputs.head }}' \
            -f body='Automated dependency checks passed.' \
            --silent

      - name: Validate and merge pull request
        id: merge
        if: steps.update.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: |
          number='${{ steps.pull.outputs.number }}'
          head='${{ steps.push.outputs.head }}'
          pull="$(
            gh pr view "${number}" \
              --repo "${GITHUB_REPOSITORY}" \
              --json baseRefName,headRefOid,mergeable,number,reviewDecision,state \
              --jq '.'
          )"
          PULL="${pull}" python3 - "${head}" <<'PY'
          import json
          import os
          import sys
          from pathlib import Path

          sys.path.insert(0, str(Path('.github/scripts').resolve()))

          from automation import (
              PullRequest,
              PullRequestUnavailableError,
              ReviewDecision,
              validate_pull_request,
          )

          expected = sys.argv[1]
          payload = json.loads(os.environ['PULL'])
          if payload['baseRefName'] != 'main':
              raise PullRequestUnavailableError(
                  'Pull request does not target main'
              )
          try:
              review = ReviewDecision(payload['reviewDecision'].lower())
          except ValueError as error:
              raise PullRequestUnavailableError(
                  'Pull request has no current approval'
              ) from error
          validate_pull_request(
              PullRequest(
                  number=payload['number'],
                  head=payload['headRefOid'],
                  state=payload['state'].lower(),
                  review=review,
              ),
              expected,
          )
          if payload['mergeable'] != 'MERGEABLE':
              raise PullRequestUnavailableError(
                  'Pull request is not currently mergeable'
              )
          PY

          if ! gh pr merge "${number}" \
            --repo "${GITHUB_REPOSITORY}" \
            --squash \
            --delete-branch \
            --match-head-commit "${head}"; then
            echo 'The merge command failed; checking the pull request state.' >&2
          fi

          merged="$(
            gh pr view "${number}" \
              --repo "${GITHUB_REPOSITORY}" \
              --json mergeCommit,state \
              --jq 'select(.state == "MERGED") | .mergeCommit.oid'
          )"
          if [[ ! "${merged}" =~ ^[0-9a-f]{40,64}$ ]]; then
            echo 'Pull request did not produce a merge commit.' >&2
            exit 1
          fi
          printf 'head=%s\n' "${merged}" >> "${GITHUB_OUTPUT}"

      - name: Create and verify lightweight tag
        id: tag
        if: steps.update.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
          MERGE_HEAD: ${{ steps.merge.outputs.head }}
        run: |
          python3 - <<'PY'
          import json
          import os
          import subprocess
          import sys
          from pathlib import Path

          sys.path.insert(0, str(Path('.github/scripts').resolve()))

          from automation import (
              Tag,
              patch_after_collision,
              release_candidate,
              validate_tag_target,
          )

          repository = os.environ['GITHUB_REPOSITORY']
          version = os.environ['GITHUB_API_VERSION']
          merge = os.environ['MERGE_HEAD']
          header = f'X-GitHub-Api-Version: {version}'

          def tags() -> tuple[str, ...]:
              result = subprocess.run(
                  (
                      'gh',
                      'api',
                      '--paginate',
                      '-X',
                      'GET',
                      (
                          f'repos/{repository}/git/'
                          'matching-refs/tags/'
                      ),
                      '-H',
                      header,
                      '-f',
                      'per_page=100',
                      '--jq',
                      '.[].ref',
                  ),
                  check=True,
                  stdout=subprocess.PIPE,
                  text=True,
              )
              prefix = 'refs/tags/'
              return tuple(
                  line[len(prefix):]
                  for line in result.stdout.splitlines()
                  if line.startswith(prefix)
              )

          def create(tag: str) -> subprocess.CompletedProcess[str]:
              return subprocess.run(
                  (
                      'gh',
                      'api',
                      '-X',
                      'POST',
                      f'repos/{repository}/git/refs',
                      '-H',
                      header,
                      '-f',
                      f'ref=refs/tags/{tag}',
                      '-f',
                      f'sha={merge}',
                      '--silent',
                  ),
                  check=False,
                  stdout=subprocess.PIPE,
                  stderr=subprocess.PIPE,
                  text=True,
              )

          def releases() -> tuple[str, ...]:
              result = subprocess.run(
                  (
                      'gh',
                      'api',
                      '--paginate',
                      '-X',
                      'GET',
                      f'repos/{repository}/releases',
                      '-H',
                      header,
                      '-f',
                      'per_page=100',
                      '--jq',
                      '.[].tag_name',
                  ),
                  check=True,
                  stdout=subprocess.PIPE,
                  text=True,
              )
              return tuple(result.stdout.splitlines())

          def read(tag: str) -> dict[str, object] | None:
              result = subprocess.run(
                  (
                      'gh',
                      'api',
                      '-X',
                      'GET',
                      f'repos/{repository}/git/ref/tags/{tag}',
                      '-H',
                      header,
                  ),
                  check=False,
                  stdout=subprocess.PIPE,
                  stderr=subprocess.PIPE,
                  text=True,
              )
              return json.loads(result.stdout) if result.returncode == 0 else None

          available = tags()
          candidate = str(release_candidate(available, releases()))
          while True:
              result = create(candidate)
              if result.returncode == 0:
                  break
              existing = read(candidate)
              if existing is None:
                  sys.stderr.write(result.stderr)
                  raise RuntimeError(f'Failed to create tag {candidate}')
              target = existing.get('object')
              if (
                  isinstance(target, dict)
                  and target.get('type') == 'commit'
                  and target.get('sha') == merge
              ):
                  break
              print(f'Tag {candidate} collided; refreshing remote tags.')
              available = tags()
              candidate = str(
                  patch_after_collision(available, candidate)
              )

          payload = read(candidate)
          if payload is None:
              raise RuntimeError(f'Tag {candidate} is missing after creation')
          target = payload['object']
          if not isinstance(target, dict) or target.get('type') != 'commit':
              raise RuntimeError(f'Tag {candidate} is not lightweight')
          validate_tag_target(
              Tag(
                  name=str(payload.get('ref', '')).removeprefix('refs/tags/'),
                  target=str(target.get('sha')),
              ),
              expected_name=candidate,
              expected_target=merge,
          )
          with open(os.environ['GITHUB_OUTPUT'], 'a', encoding='utf-8') as output:
              print(f'name={candidate}', file=output)
          PY

      - name: Create and verify release
        if: steps.update.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
          MERGE_HEAD: ${{ steps.merge.outputs.head }}
          TAG: ${{ steps.tag.outputs.name }}
        run: |
          gh release create "${TAG}" \
            --repo "${GITHUB_REPOSITORY}" \
            --verify-tag \
            --target "${MERGE_HEAD}" \
            --generate-notes \
            --latest \
            --fail-on-no-commits

          release="$(
            gh api \
              -X GET \
              -H "X-GitHub-Api-Version: ${GITHUB_API_VERSION}" \
              "repos/${GITHUB_REPOSITORY}/releases/tags/${TAG}"
          )"
          tag="$(
            gh api \
              -X GET \
              -H "X-GitHub-Api-Version: ${GITHUB_API_VERSION}" \
              "repos/${GITHUB_REPOSITORY}/git/ref/tags/${TAG}"
          )"
          RELEASE="${release}" TAG_REF="${tag}" python3 - <<'PY'
          import json
          import os
          import sys
          from pathlib import Path

          sys.path.insert(0, str(Path('.github/scripts').resolve()))

          from automation import (
              Release,
              Tag,
              validate_release_target,
              validate_tag_target,
          )

          expected_tag = os.environ['TAG']
          expected_target = os.environ['MERGE_HEAD']
          release = json.loads(os.environ['RELEASE'])
          tag = json.loads(os.environ['TAG_REF'])
          target = tag['object']
          if not isinstance(target, dict) or target.get('type') != 'commit':
              raise RuntimeError(f'Tag {expected_tag} is not lightweight')
          actual_target = str(target.get('sha'))
          validate_tag_target(
              Tag(name=tag['ref'].removeprefix('refs/tags/'), target=actual_target),
              expected_name=expected_tag,
              expected_target=expected_target,
          )
          validate_release_target(
              Release(tag=release['tag_name'], target=actual_target),
              expected_tag=expected_tag,
              expected_target=expected_target,
          )
          if release['draft'] or release['prerelease']:
              raise RuntimeError('Release is not a published stable release')
          PY
